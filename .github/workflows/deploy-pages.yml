name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master
    workflow_dispatch:

permissions:
  contents: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source without external actions
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  git init .
                  git config --global --add safe.directory "$PWD"
                  git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git fetch --depth 1 origin "${GITHUB_SHA}"
                  git checkout --detach FETCH_HEAD

            - name: Verify Node version
              run: |
                  set -euo pipefail
                  node --version
                  npm --version
                  node -e "const major=parseInt(process.versions.node.split('.')[0],10); if (major < 20) { console.error('Node.js 20+ is required'); process.exit(1) }"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Publish dist to gh-pages branch
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  if [ ! -d dist ]; then
                    echo "dist directory not found"
                    exit 1
                  fi

                  tmp_dir="$(mktemp -d)"
                  cp -R dist/. "$tmp_dir/"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git switch --orphan gh-pages
                  git reset --hard
                  git clean -fdx

                  cp -R "$tmp_dir"/. .
                  touch .nojekyll

                  git add -A
                  if git diff --cached --quiet; then
                    echo "No changes to publish"
                    exit 0
                  fi

                  git commit -m "Deploy ${GITHUB_SHA}"
                  git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
